<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Island House — Resort Wear for the Long Way Home</title>
    <meta
      name="description"
      content="Linen, silk, and easy cotton resort wear. Shop shirts, dresses, trousers, and accessories made for warm-weather life."
    />
    <!-- Open Graph -->
    <meta property="og:title" content="Island House — Resort Wear for the Long Way Home" />
    <meta property="og:description" content="A Tommy Bahama website clone demonstrating Adobe Experience Platform (AEP) functionality." />
    <meta property="og:type" content="website" />
    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Island House — Resort Wear for the Long Way Home" />
    <meta name="twitter:description" content="A Tommy Bahama website clone demonstrating Adobe Experience Platform (AEP) functionality." />
    <!-- Favicon -->
    <link rel="icon" href="/favicon.ico" type="image/x-icon" />

    <!--
      xwalk / Universal Editor connection meta.
      data-aue-resource attributes are injected per-node by AEM when served via fstab.
    -->
    <meta name="urn:auecon:aemconnection" content="aem:author" />

    <!-- Critical styles -->
    <link rel="stylesheet" href="/styles/styles.css" />
    <link rel="stylesheet" href="/blocks/header/header.css" />
    <link rel="stylesheet" href="/blocks/hero/hero.css" />

    <!-- EDS bootstrap: aem.js runs setup() before scripts.js loads -->
    <script type="module" src="/scripts/aem.js"></script>
    <script type="module" src="/scripts/scripts.js"></script>
  </head>
  <body>
    <header></header>

    <main>
      <!--
        xwalk DOM contract:
          main > div           ← raw section div (decorateSections adds .section + wraps children)
            > div.blockname    ← block (decorateSections wraps in div; decorateBlocks finds section>div>div)

        DO NOT add an extra <div> wrapper inside each section — decorateSections creates that wrapper
        automatically. A manual wrapper would push blocks one level too deep for decorateBlocks.
      -->

      <!-- ── Hero ── (no-pad class on section so decorateSections preserves it) -->
      <div class="no-pad">
        <div class="hero"></div>
      </div>

      <!-- ── Story strip ── -->
      <div>
        <div>
          <div class="story-strip-wrap container-x max-w-site">
            <div class="eyebrow story-eyebrow">Since a Tuesday in 2014</div>
            <h2 class="story-heading">
              A wardrobe cut for warm afternoons, salt air, and porch light dinners.
            </h2>
          </div>
        </div>
      </div>

      <!-- ── Categories ── -->
      <div class="flush-top">
        <div class="categories"></div>
      </div>

      <!-- ── Featured products ── -->
      <div>
        <div
          class="product-list"
          data-eyebrow="The Editor's Table"
          data-heading="Just landed"
          data-limit="4"
          data-view-all="/category.html?category=women"
        ></div>
      </div>

      <!-- ── AEP Recommendations slot ── -->
      <div class="flush-top">
        <div class="recommendations"></div>
      </div>
    </main>

    <footer></footer>

    <style>
      /* Section style modifiers — applied as classes on the section div.
         In xwalk/AEM these come from section-metadata blocks.
         In static local HTML we set them directly. */
      main .section.no-pad    { padding-block: 0; }
      main .section.flush-top { padding-top: 0; }

      .story-strip-wrap {
        text-align: center;
      }
      .story-eyebrow {
        color: var(--coral);
        margin-bottom: 1rem;
      }
      .story-heading {
        font-family: var(--font-serif);
        font-size: clamp(1.5rem, 4vw, 3rem);
        max-width: 48rem;
        margin-inline: auto;
        color: var(--ocean);
      }
    </style>
  </body>
</html>
